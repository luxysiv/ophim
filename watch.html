<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xem Phim</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        /* Double tap indicators */
        .tap-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .tap-left { left: 10%; }
        .tap-right { right: 10%; }
        .tap-show { opacity: 1; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-film me-2 text-danger"></i>Phim Hay
            </a>
        </div>
    </nav>

    <main class="container-fluid my-4">
        <div class="row">
            <div class="col-md-9">
                <h1 id="movie-title"></h1>
                <div class="video-container position-relative mb-4">
                    <video id="video-player" class="video-js vjs-big-play-centered" controls preload="auto" width="100%" height="auto"></video>
                    <div class="tap-indicator tap-left"><i class="fas fa-undo"></i> 10s</div>
                    <div class="tap-indicator tap-right">10s <i class="fas fa-redo"></i></div>
                </div>
                <div id="episode-info"></div>
            </div>
            <div class="col-md-3">
                <div class="card bg-dark text-white">
                    <div class="card-header">
                        <i class="fas fa-list-ul me-1"></i> Danh sách tập
                    </div>
                    <ul class="list-group list-group-flush" id="episodes-sidebar"></ul>
                </div>
            </div>
        </div>
    </main>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Video.js -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

    <!-- Script của bạn -->
    <script src="watch.js"></script>
</body>
</html>
